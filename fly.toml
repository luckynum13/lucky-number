# fly.toml — Fly.io configuration for Lucky Number Bot

app = "lucky-number-bot"
primary_region = "ams"          # Amsterdam — offshore, outside CIS jurisdiction

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = false   # Keep running 24/7 — important for a bot!
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for SQLite database
[[mounts]]
  source      = "lucky_data"
  destination = "/app/data"
